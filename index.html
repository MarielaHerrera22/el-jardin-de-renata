<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>El Jardín de Renata</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">

</head>


<body>


<div class="overlay">


    <div class="titulo">


        <h1>
            Siempre vas a tener un lugar entre nosotros
        </h1>


        <img 
            src="assets/img/mariposa.png" 
            class="mariposa" 
            alt="mariposa"
        >


        <button id="btn-flor">

            <img
                src="assets/img/boton-portada.png"
                alt="Plantar una flor"
                class="boton-madera"
            >

        </button>


    </div>


</div>



<!-- MODAL PLANTAR -->


<div id="modal-flor">


    <div class="ventana">


        <button id="cerrar-modal">
            ✕
        </button>


        <h2>
            Plantar una flor
        </h2>


        <p class="subtitulo">

            No hace falta escribir perfecto.<br>
            Alcanza con escribir con amor.

        </p>


        <hr>


        <h3>
            ¿Qué queres regalarle a Renata hoy?
        </h3>



        <div class="cantero">


            <img 
                src="assets/img/cantero.png" 
                id="cantero"
            >

        </div>

        <div class="selector-flores">

            <div class="opcion-flor">
                <img src="assets/flores/rosa.png" class="flor-interactiva" data-flor="rosa">
                <span>Cariño</span>
            </div>

            <div class="opcion-flor">
                <img src="assets/flores/margarita.png" class="flor-interactiva" data-flor="margarita">
                <span>Esperanza</span>
            </div>

            <div class="opcion-flor">
                <img src="assets/flores/amapola.png" class="flor-interactiva" data-flor="amapola">
                <span>Recuerdo</span>
            </div>

            <div class="opcion-flor">
                <img src="assets/flores/tulipan.png" class="flor-interactiva" data-flor="tulipan">
                <span>Gratitud</span>
            </div>

            <div class="opcion-flor">
                <img src="assets/flores/girasol.png" class="flor-interactiva" data-flor="girasol">
                <span>Luz</span>
            </div>

            <div class="opcion-flor">
                <img src="assets/flores/rosa-china.png" class="flor-interactiva" data-flor="rosa-china">
                <span>Alegría</span>
            </div>

            <div class="opcion-flor">
                <img src="assets/flores/dalia.png" class="flor-interactiva" data-flor="dalia">
                <span>Fortaleza</span>
            </div>

            <div class="opcion-flor">
                <img src="assets/flores/lavanda.png" class="flor-interactiva" data-flor="lavanda">
                <span>Calma</span>
            </div>

            <div class="opcion-flor">
                <img src="assets/flores/lirio.png" class="flor-interactiva" data-flor="lirio">
                <span>Pureza</span>
            </div>

            <div class="opcion-flor">
                <img src="assets/flores/jazmin.png" class="flor-interactiva" data-flor="jazmin">
                <span>Amor eterno</span>
            </div>

        </div>


        <label>
            Tu mensaje
        </label>


        <textarea 
            id="mensaje"
            placeholder="Escribí tu mensaje..."
        ></textarea>



        <label>
            Tu nombre
        </label>
        

        <input
            type="text"
            id="nombre"
            placeholder="Tu nombre"
        >
        
>
        <label>
            📷 ¿Querés dejar una imagen para Renata?
        </label>
        <label for="imagen" class="boton-imagen">
            📷 Elegir una imagen
        </label>

        <input
            type="file"
            id="imagen"
            accept="image/*">


        <div id="vista-imagen"></div>



        <button 
            id="plantar" 
            class="oculto"
        >

            <img 
                src="assets/img/boton-formulario.png"
                alt="Plantar mi flor"
                class="boton-madera"
            >

        </button>



    </div>


</div>




<!-- MENSAJE ELEGIR LUGAR -->


<div id="sembrar" class="oculto">

    <p>
        🌱 Elegí un lugar para plantar tu flor
    </p>

</div>




<!-- JARDIN -->

<div id="jardin"></div>



<script src="js/app.js"></script>


</body>

</html>
